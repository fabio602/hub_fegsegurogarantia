<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório de Parceria — F&G Seguro Garantia</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f1ec; min-height: 100vh; padding: 32px 16px; color: #1B263B; }
    .container { max-width: 960px; margin: 0 auto; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { width: 48px; height: 48px; background: #1B263B; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #C69C6D; font-weight: 900; font-size: 18px; flex-shrink: 0; }
    .header h1 { font-size: 20px; font-weight: 900; color: #1B263B; }
    .header p { font-size: 13px; color: #64748b; margin-top: 2px; }
    .btn-sair { padding: 8px 18px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 12px; font-weight: 700; color: #64748b; cursor: pointer; transition: all .2s; }
    .btn-sair:hover { background: #fee2e2; color: #ef4444; border-color: #fca5a5; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; border: 1px solid #e2e8f0; }
    .card .label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8; margin-bottom: 6px; }
    .card .value { font-size: 22px; font-weight: 900; color: #1B263B; }
    .card .value.gold { color: #C69C6D; }

    .table-wrap { background: #fff; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; }
    .table-header { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .table-header h2 { font-size: 15px; font-weight: 900; }
    input[type=text] { border: 1px solid #e2e8f0; border-radius: 10px; padding: 7px 12px; font-size: 12px; outline: none; background: #f8fafc; color: #1B263B; }

    .scroll-x { overflow-x: scroll; scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
    .scroll-x::-webkit-scrollbar { height: 6px; }
    .scroll-x::-webkit-scrollbar-track { background: #f1f5f9; }
    .scroll-x::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
    thead th { padding: 12px 20px; text-align: left; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8; background: #f8fafc; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f8fafc; transition: background .15s; }
    tbody tr:hover { background: #fafafa; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 14px 20px; vertical-align: middle; }
    .nome { font-weight: 800; }
    .produto { color: #475569; }
    .comissao { font-weight: 900; }
    .parceiro-val { font-weight: 900; color: #C69C6D; font-size: 14px; }
    .data { color: #94a3b8; font-size: 12px; white-space: nowrap; }
    .empty { padding: 48px; text-align: center; color: #94a3b8; font-size: 14px; font-weight: 600; }
    .footer { text-align: center; margin-top: 32px; font-size: 11px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo">F&G</div>
        <div>
          <h1>Relatório de Parceria</h1>
          <p id="nome-parceiro">Carregando...</p>
        </div>
      </div>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>

    <div class="cards">
      <div class="card"><div class="label">Vendas fechadas</div><div class="value" id="total-vendas">—</div></div>
      <div class="card"><div class="label">Prêmio total</div><div class="value" id="total-premio">—</div></div>
      <div class="card"><div class="label">Comissão F&G</div><div class="value" id="total-comissao">—</div></div>
      <div class="card"><div class="label">Sua comissão</div><div class="value gold" id="total-parceiro">—</div></div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>Clientes e comissões</h2>
        <input type="text" id="busca" placeholder="Buscar cliente..." oninput="filtrar()" />
      </div>
      <div class="scroll-x" id="top-scroll"><div id="top-inner" style="height:1px"></div></div>
      <div class="scroll-x" id="tabela-scroll">
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Cliente</th>
              <th>Produto</th>
              <th>Prêmio</th>
              <th>Comissão F&G</th>
              <th>Sua comissão</th>
              <th style="text-align:center">Apólice</th>
              <th style="text-align:center">Boleto</th>
            </tr>
          </thead>
          <tbody id="tabela-body">
            <tr><td colspan="8" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="footer">F&G Corretora de Seguros · Uso exclusivo para parceiros</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://hfjvwibucplyhsvnwfor.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmanZ3aWJ1Y3BseWhzdm53Zm9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODA4NTIsImV4cCI6MjA4Nzk1Njg1Mn0.jCBS1YnDcKuVzJSVhGiJM0kyafPMZxFi52kszTJCxZQ';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const session = JSON.parse(localStorage.getItem('parceiro_session') || 'null');
    if (!session) { window.location.href = 'parceiros-login.html'; }

    const PCT = (session?.commission_pct || 20) / 100;
    document.getElementById('nome-parceiro').textContent = session?.name || '';

    const topScroll = document.getElementById('top-scroll');
    const tabelaScroll = document.getElementById('tabela-scroll');
    const topInner = document.getElementById('top-inner');
    tabelaScroll.addEventListener('scroll', () => topScroll.scrollLeft = tabelaScroll.scrollLeft);
    topScroll.addEventListener('scroll', () => tabelaScroll.scrollLeft = topScroll.scrollLeft);

    function sair() {
      localStorage.removeItem('parceiro_session');
      window.location.href = 'parceiros-login.html';
    }

    function fmt(v) {
      if (!v || v === 0) return '—';
      return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    function parseVal(v) {
      if (!v) return 0;
      const n = parseFloat(String(v).replace(/[^0-9,.-]/g, '').replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }
    function fmtData(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    let todasVendas = [];

    function filtrar() {
      const busca = document.getElementById('busca').value.toLowerCase();
      const filtradas = todasVendas.filter(v => !busca || (v.nome || '').toLowerCase().includes(busca));
      renderTabela(filtradas);
      atualizarCards(filtradas);
    }

    function renderTabela(vendas) {
      const tbody = document.getElementById('tabela-body');
      if (!vendas.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">Nenhuma venda encontrada.</td></tr>';
        return;
      }
      tbody.innerHTML = vendas.map(v => {
        const comissao = parseVal(v.comissao);
        const parceiro = comissao * PCT;
        const btnApolice = v.apolice_url
          ? `<a href="${v.apolice_url}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:#dcfce7;color:#16a34a;border-radius:8px;font-size:11px;font-weight:900;text-decoration:none;">⬇ Apólice</a>`
          : `<span style="color:#cbd5e1;font-size:11px;">—</span>`;
        const btnBoleto = v.boleto_url
          ? `<a href="${v.boleto_url}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:#dbeafe;color:#1d4ed8;border-radius:8px;font-size:11px;font-weight:900;text-decoration:none;">⬇ Boleto</a>`
          : `<span style="color:#cbd5e1;font-size:11px;">—</span>`;
        return `<tr>
          <td class="data">${fmtData(v.data)}</td>
          <td class="nome">${v.nome || '—'}</td>
          <td class="produto">${v.product_type || v.tipo || '—'}</td>
          <td>${fmt(parseVal(v.premio))}</td>
          <td class="comissao">${fmt(comissao)}</td>
          <td class="parceiro-val">${parceiro > 0 ? fmt(parceiro) : '—'}</td>
          <td style="text-align:center">${btnApolice}</td>
          <td style="text-align:center">${btnBoleto}</td>
        </tr>`;
      }).join('');
      setTimeout(() => { topInner.style.width = tabelaScroll.scrollWidth + 'px'; }, 100);
    }

    function atualizarCards(vendas) {
      const totalPremio = vendas.reduce((s, v) => s + parseVal(v.premio), 0);
      const totalComissao = vendas.reduce((s, v) => s + parseVal(v.comissao), 0);
      document.getElementById('total-vendas').textContent = vendas.length;
      document.getElementById('total-premio').textContent = totalPremio > 0 ? fmt(totalPremio) : '—';
      document.getElementById('total-comissao').textContent = totalComissao > 0 ? fmt(totalComissao) : '—';
      document.getElementById('total-parceiro').textContent = totalComissao > 0 ? fmt(totalComissao * PCT) : '—';
    }

    async function carregar() {
      const { data, error } = await client
        .from('sales')
        .select('data, nome, tipo, product_type, premio, comissao, parceiro, apolice_url, boleto_url')
        .eq('vendeu', 'Sim')
        .eq('parceiro', session.name)
        .order('data', { ascending: false });

      if (error) {
        document.getElementById('tabela-body').innerHTML = '<tr><td colspan="6" class="empty">Erro ao carregar dados.</td></tr>';
        return;
      }
      todasVendas = data || [];
      renderTabela(todasVendas);
      atualizarCards(todasVendas);
    }

    carregar();
  </script>
</body>
</html>
