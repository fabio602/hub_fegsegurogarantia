<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Apólices — F&G Seguro Garantia</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f1ec; min-height: 100vh; padding: 40px 16px; color: #1B263B; }
    .container { max-width: 720px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 40px; }
    .logo { width: 60px; height: 60px; background: #1B263B; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: #C69C6D; font-weight: 900; font-size: 22px; margin: 0 auto 16px; }
    .header h1 { font-size: 24px; font-weight: 900; color: #1B263B; }
    .header p { font-size: 14px; color: #64748b; margin-top: 4px; }

    .search-card { background: #fff; border-radius: 20px; padding: 32px; border: 1px solid #e2e8f0; margin-bottom: 32px; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
    .search-card label { display: block; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; }
    .input-row { display: flex; gap: 12px; }
    .input-row input { flex: 1; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; background: #f8fafc; color: #1B263B; transition: border .2s; }
    .input-row input:focus { border-color: #C69C6D; background: #fff; }
    .input-row button { padding: 14px 28px; background: #1B263B; color: #fff; font-weight: 900; font-size: 14px; border: none; border-radius: 12px; cursor: pointer; transition: background .2s; white-space: nowrap; }
    .input-row button:hover { background: #243447; }
    .input-row button:disabled { opacity: .5; cursor: not-allowed; }

    .msg { text-align: center; padding: 20px; font-size: 14px; font-weight: 600; color: #94a3b8; }
    .msg.error { color: #ef4444; }

    .results { display: flex; flex-direction: column; gap: 16px; }
    .apolice-card { background: #fff; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .apolice-info .empresa { font-size: 16px; font-weight: 900; color: #1B263B; }
    .apolice-info .segurado { font-size: 12px; color: #475569; margin-top: 4px; }
    .apolice-info .meta { font-size: 12px; color: #64748b; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 12px; }
    .meta-item { display: flex; align-items: center; gap: 4px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; background: #dbeafe; color: #1d4ed8; }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .btn-download { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: #1B263B; color: #fff; border-radius: 12px; font-size: 13px; font-weight: 900; text-decoration: none; transition: background .2s; white-space: nowrap; }
    .btn-download:hover { background: #243447; }
    .btn-download svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-boleto { background: #1d4ed8; }
    .btn-boleto:hover { background: #1e40af; }

    .footer { text-align: center; margin-top: 40px; font-size: 11px; color: #94a3b8; }
    .whatsapp-btn { position: fixed; bottom: 24px; right: 24px; display: flex; align-items: center; gap: 10px; background: #25D366; color: #fff; font-weight: 900; font-size: 13px; padding: 12px 20px; border-radius: 50px; text-decoration: none; box-shadow: 0 4px 20px rgba(37,211,102,.4); transition: all .2s; z-index: 100; }
    .whatsapp-btn:hover { background: #1ebe5d; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(37,211,102,.5); }
    .whatsapp-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">F&G</div>
      <h1>Minhas Apólices</h1>
      <p>F&G Corretora de Seguros — consulte suas apólices pelo CNPJ</p>
    </div>

    <div class="search-card">
      <label>CNPJ da empresa</label>
      <div class="input-row">
        <input type="text" id="cnpj-input" placeholder="00.000.000/0000-00" maxlength="18" oninput="mascara(this)" onkeydown="if(event.key==='Enter') buscar()" />
        <button id="btn-buscar" onclick="buscar()">Buscar</button>
      </div>
    </div>

    <div id="resultado"></div>

    <div class="footer">F&G Corretora de Seguros · Acesso exclusivo ao titular do CNPJ</div>
  </div>

  <a href="https://wa.me/5515998618659?text=Olá!%20Preciso%20de%20ajuda%20com%20minhas%20apólices." target="_blank" rel="noopener noreferrer" class="whatsapp-btn">
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Falar com a corretora
  </a>

  <script>
    const SUPABASE_URL = 'https://hfjvwibucplyhsvnwfor.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmanZ3aWJ1Y3BseWhzdm53Zm9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODA4NTIsImV4cCI6MjA4Nzk1Njg1Mn0.jCBS1YnDcKuVzJSVhGiJM0kyafPMZxFi52kszTJCxZQ';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function mascara(el) {
      let v = el.value.replace(/\D/g, '').substring(0, 14);
      v = v.replace(/^(\d{2})(\d)/, '$1.$2');
      v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
      v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
      v = v.replace(/(\d{4})(\d)/, '$1-$2');
      el.value = v;
    }

    function cnpjRaw(v) {
      return v.replace(/\D/g, '');
    }

    function fmtData(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function fmtMoeda(v) {
      if (!v) return null;
      // Remove tudo exceto dígitos, vírgula e ponto
      let s = String(v).replace(/[^0-9,.]/g, '');
      // Formato BR: ponto = milhar, vírgula = decimal → remove pontos, troca vírgula por ponto
      s = s.replace(/\./g, '').replace(',', '.');
      const n = parseFloat(s);
      if (isNaN(n) || n === 0) return null;
      return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    async function buscar() {
      const raw = cnpjRaw(document.getElementById('cnpj-input').value);
      if (raw.length < 14) {
        document.getElementById('resultado').innerHTML = '<p class="msg error">Digite um CNPJ válido com 14 dígitos.</p>';
        return;
      }

      const btn = document.getElementById('btn-buscar');
      btn.disabled = true;
      btn.textContent = 'Buscando...';
      document.getElementById('resultado').innerHTML = '<p class="msg">Consultando...</p>';

      const cnpjFormatado = document.getElementById('cnpj-input').value;

      // Buscar vendas pelo CNPJ (com ou sem formatação)
      const { data, error } = await client
        .from('sales')
        .select('id, data, nome, product_type, tipo, seguradora, segurado, premio, vigencia_inicio, vigencia_fim, apolice_url')
        .or(`cnpj.eq.${raw},cnpj.eq.${cnpjFormatado}`)
        .eq('vendeu', 'Sim');

      btn.disabled = false;
      btn.textContent = 'Buscar';

      if (error) {
        document.getElementById('resultado').innerHTML = '<p class="msg error">Erro ao consultar. Tente novamente.</p>';
        return;
      }

      if (!data || data.length === 0) {
        document.getElementById('resultado').innerHTML = '<p class="msg">Nenhuma apólice encontrada para este CNPJ.</p>';
        return;
      }

      // Buscar boletos para todas as vendas
      const ids = data.map(a => a.id);
      const { data: bData } = await client
        .from('boletos')
        .select('sale_id, parcela, vencimento, url')
        .in('sale_id', ids)
        .order('parcela');

      const bMap = {};
      (bData || []).forEach(b => {
        if (!bMap[b.sale_id]) bMap[b.sale_id] = [];
        bMap[b.sale_id].push(b);
      });

      // Filtrar apenas registros que têm apólice OU boleto
      const comDocumentos = data.filter(a => a.apolice_url || (bMap[a.id] && bMap[a.id].length > 0));

      if (comDocumentos.length === 0) {
        document.getElementById('resultado').innerHTML = '<p class="msg">Nenhum documento disponível para este CNPJ ainda.</p>';
        return;
      }

      document.getElementById('resultado').innerHTML = `
        <div class="results">
          ${comDocumentos.map(a => {
            const produto = a.product_type || a.tipo || '—';
            const vigencia = (a.vigencia_inicio || a.vigencia_fim)
              ? `${fmtData(a.vigencia_inicio)} → ${fmtData(a.vigencia_fim)}`
              : null;
            const premio = fmtMoeda(a.premio);
            const boletos = bMap[a.id] || [];

            const btnApolice = a.apolice_url
              ? `<a href="${a.apolice_url}" target="_blank" rel="noopener noreferrer" class="btn-download">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>
                  Apólice
                </a>`
              : '';

            const btnsBoleto = boletos.map(b =>
              `<a href="${b.url}" target="_blank" rel="noopener noreferrer" class="btn-download btn-boleto">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>
                Boleto ${b.parcela}${b.vencimento ? ' <span style="font-size:10px;opacity:.75">(' + fmtData(b.vencimento) + ')</span>' : ''}
              </a>`
            ).join('');

            return `
            <div class="apolice-card">
              <div class="apolice-info">
                <div class="empresa">${a.nome || '—'}</div>
                ${a.segurado ? `<div class="segurado">Segurado: <strong>${a.segurado}</strong></div>` : ''}
                <div class="meta">
                  <span class="badge">${produto}</span>
                  ${a.seguradora ? `<span class="meta-item">🏢 ${a.seguradora}</span>` : ''}
                  ${vigencia ? `<span class="meta-item">📅 ${vigencia}</span>` : ''}
                  ${premio ? `<span class="meta-item">💰 ${premio}</span>` : ''}
                  <span class="meta-item">📄 Emitida em ${fmtData(a.data)}</span>
                </div>
              </div>
              <div class="btns">${btnApolice}${btnsBoleto}</div>
            </div>
            `;
          }).join('')}
        </div>
      `;
    }
  </script>
</body>
</html>
